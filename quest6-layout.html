<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest 6 - Flexbox</title>

<link rel="stylesheet" href="quest6-layout.css">

</head>
<body>

<h1>Flexbox Layout Example</h1>

<!-- Flex Container -->
<div class="container">
  <div class="box">Box 1</div>
  <div class="box">Box 2</div>
  <div class="box">Box 3</div>
</div>

<!-- Column Example -->
<h2>Column Layout</h2>

<div class="column-container">
  <div class="box">Item A</div>
  <div class="box">Item B</div>
  <div class="box">Item C</div>
</div>

<!-- Center Anything Example -->
<div class="centered">
  <div class="center-box">Centered Content</div>
</div>

</body>
</html>
